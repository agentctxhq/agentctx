# Claude PR Review
#
# A thorough, multi-pass review with inline committable suggestions.
#
# When it runs:
#   - Automatically, once, when a PR is opened (non-draft) or marked ready for review.
#   - On demand: comment "@claude review" (at the start of a top-level PR comment)
#     to (re-)review after pushing fixes. Comments that merely *mention* @claude are
#     handled by claude.yml instead.
#
# Cost notes (Claude Pro subscription via OAuth token):
#   - Each review consumes Pro quota shared with local Claude Code usage, so reviews
#     do NOT re-run on every push — re-request explicitly with "@claude review".
#   - Draft PRs are skipped (Claude's own issue-implementation PRs open as drafts).
#   - Add "[skip-review]" to the PR title to opt a PR out of the automatic review.
#
# What it will never do: approve/request changes, push commits, or edit the PR.
# Fixes are offered as GitHub suggestion blocks you can accept with one click.

name: Claude PR Review

on:
  pull_request:
    types: [opened, ready_for_review]
  issue_comment:
    types: [created]

concurrency:
  group: claude-review-${{ github.event.pull_request.number || github.event.issue.number }}
  cancel-in-progress: false

jobs:
  review:
    if: |
      (github.event_name == 'pull_request' &&
       github.event.pull_request.draft == false &&
       github.event.pull_request.head.repo.full_name == github.repository &&
       !contains(github.event.pull_request.title, '[skip-review]')) ||
      (github.event_name == 'issue_comment' &&
       github.event.issue.pull_request &&
       startsWith(github.event.comment.body, '@claude review') &&
       contains(fromJSON('["OWNER","MEMBER","COLLABORATOR"]'), github.event.comment.author_association))
    runs-on: ubuntu-latest
    timeout-minutes: 12
    permissions:
      contents: read
      pull-requests: write
      issues: write
      id-token: write
      actions: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Run Claude PR Review
        uses: anthropics/claude-code-action@v1
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          track_progress: true
          prompt: |
            REPO: ${{ github.repository }}
            PR NUMBER: ${{ github.event.pull_request.number || github.event.issue.number }}

            Perform a thorough multi-pass code review of this PR. Work briskly and
            finish well within 10 minutes — depth on real issues, no padding.

            ## Pass 1 — Context
            1. `gh pr checkout <PR NUMBER>`, then `gh pr view <PR NUMBER> --json title,body,baseRefName,files`
               and `gh pr diff <PR NUMBER>` to understand the intent and the change surface.
            2. Read CLAUDE.md. If the diff touches behavior covered by docs/SPEC.md or
               docs/ARCHITECTURE.md (record types, hooks, budgets, MCP tools, storage),
               read the relevant sections — the "Key constraints" in CLAUDE.md and the
               ADRs are binding.
            3. If the diff is trivial (typo/docs-only), post a one-line summary saying so
               and stop here.

            ## Pass 2 — Investigate
            4. For every changed file, read the surrounding code in the checkout, not just
               the diff hunks. Trace callers/callees of changed functions where behavior
               could break. Do NOT run npm install, builds, or tests — CI covers that;
               this review is static analysis only.
            5. Collect candidate findings in these categories ONLY:
               - Correctness: logic errors, broken edge cases (empty/null input, error
                 paths, off-by-one, ordering/race issues), API misuse, type holes.
               - Spec & architecture: contradictions with docs/SPEC.md, the ADRs in
                 docs/ARCHITECTURE.md, or CLAUDE.md constraints (token budgets, no
                 daemon, bi-temporal supersede-never-overwrite, FTS5 floor, no compiler
                 on the install path). Also flag when the change makes SPEC.md/ADRs
                 outdated without updating them in the same PR.
               - Security: injection, unsafe path/subprocess handling, secrets.
               - Silent regressions of documented behavior.
               Do not flag style, formatting, naming, or missing tests unless they hide a
               real bug — lint and CI already enforce those.

            ## Pass 3 — Verify
            6. Re-check every candidate against the actual code before reporting. Each
               finding must cite a specific file:line and a concrete failure scenario.
               Drop anything speculative — a false positive costs the author more than a
               miss.

            ## Pass 4 — Report
            7. Post each verified finding as an inline comment using
               mcp__github_inline_comment__create_inline_comment:
               - Start with a severity marker: 🔴 must-fix bug, 🟡 minor (worth fixing,
                 not blocking), 🟣 pre-existing (not introduced by this PR).
               - 1–3 sentences: what breaks, when, and why.
               - If the fix is ~5 lines or fewer and self-contained, include a
                 ```suggestion block so it can be committed with one click. The block
                 replaces the exact commented line range, so it must be a complete,
                 syntactically valid drop-in (watch indentation). For larger fixes,
                 describe the fix in prose instead — never a suggestion block.
               - Post at most 5 🟡 comments; mention any further nits only as a count in
                 the summary.
            8. Finish by updating the tracking comment with the summary:
               - First line is the verdict: "✅ No blocking issues" or "🔴 N blocking issue(s)".
               - A table: severity | file:line | one-line issue.
               - One short paragraph on what you checked and anything you deliberately
                 skipped.

            Hard rules: never use `gh pr review` or approve/request changes; never push
            commits or modify files; keep total inline comments ≤ 12.
          claude_args: |
            --max-turns 40
            --allowedTools "mcp__github_inline_comment__create_inline_comment,Bash(gh pr checkout:*),Bash(gh pr view:*),Bash(gh pr diff:*),Bash(gh pr checks:*)"
