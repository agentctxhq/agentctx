name: Bug report
description: Something doesn't work the way the docs or spec say it should
labels: [bug]
body:
  - type: textarea
    id: what-happened
    attributes:
      label: What happened?
      description: What did you do, what did you expect, what happened instead?
    validations:
      required: true
  - type: textarea
    id: repro
    attributes:
      label: Steps to reproduce
      placeholder: |
        1. agentctx init
        2. ...
    validations:
      required: true
  - type: input
    id: version
    attributes:
      label: agentctx version
      placeholder: agentctx --version
    validations:
      required: true
  - type: input
    id: environment
    attributes:
      label: Environment
      placeholder: "OS, Node version (node --version), Claude Code version"
    validations:
      required: true
  - type: textarea
    id: logs
    attributes:
      label: Relevant logs or output
      render: shell
