name: Feature request
description: Propose a new capability or a change to existing behavior
labels: [enhancement]
body:
  - type: markdown
    attributes:
      value: |
        Before proposing, check the scope boundaries in [VISION.md](https://github.com/agentctxhq/agentctx/blob/main/docs/VISION.md) — proposals that conflict with "What agentctx Is Not" will be declined. Contract changes (record types, tool signatures, budgets) also require a [SPEC.md](https://github.com/agentctxhq/agentctx/blob/main/docs/SPEC.md) update.
  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: What problem does this solve? Who hits it and when?
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposed solution
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
  - type: checkboxes
    id: scope
    attributes:
      label: Scope check
      options:
        - label: I checked VISION.md's "What agentctx Is Not" and this proposal does not conflict with it
          required: true
